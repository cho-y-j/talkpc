{% extends "admin/base.html" %}
{% set active = "credits" %}
{% block title %}결제 내역 - TalkPC 관리자{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-receipt"></i> 전체 결제 내역</h4>
    <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="filterType" style="width:130px" onchange="loadCredits()">
            <option value="">전체</option>
            <option value="charge">충전</option>
            <option value="bonus">보너스</option>
            <option value="use">사용</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadCredits()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
</div>

<!-- 요약 -->
<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">총 충전</div>
                <div class="stat-value text-success" id="statCharge">0원</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">총 보너스</div>
                <div class="stat-value text-info" id="statBonus">0원</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">총 사용</div>
                <div class="stat-value text-danger" id="statUse">0원</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">총 거래 건수</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
        </div>
    </div>
</div>

<!-- 내역 테이블 -->
<div class="card stat-card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th><th>일시</th><th>회원</th><th>유형</th><th>금액</th><th>설명</th>
                    </tr>
                </thead>
                <tbody id="creditTable"></tbody>
            </table>
        </div>
    </div>
</div>

<nav class="mt-3 d-flex justify-content-center">
    <ul class="pagination pagination-sm" id="pagination"></ul>
</nav>
{% endblock %}

{% block scripts %}
<script>
    const TYPE_BADGE = {
        'charge': '<span class="badge bg-success">충전</span>',
        'bonus': '<span class="badge bg-info">보너스</span>',
        'use': '<span class="badge bg-warning text-dark">사용</span>',
    };

    let currentPage = 1;
    const pageSize = 100;

    async function loadCredits(page = 1) {
        currentPage = page;
        const type = document.getElementById('filterType').value;
        let url = `/admin/credits?page=${page}&size=${pageSize}`;
        if (type) url += `&credit_type=${type}`;

        const data = await api(url);
        if (!data) return;

        const credits = data.credits || [];
        const total = data.total || 0;

        document.getElementById('statTotal').textContent = total;

        // 요약 통계 (별도 요청)
        const allCharge = await api('/admin/credits?credit_type=charge&size=1');
        const allBonus = await api('/admin/credits?credit_type=bonus&size=1');
        const allUse = await api('/admin/credits?credit_type=use&size=1');

        // 통계는 stats API에서 가져오는 게 맞지만, 간단히 표시
        if (page === 1 && !type) {
            let chargeSum = 0, bonusSum = 0, useSum = 0;
            // 전체를 가져올 수 없으니 현재 페이지 기준으로만
            credits.forEach(c => {
                if (c.type === 'charge') chargeSum += c.amount;
                if (c.type === 'bonus') bonusSum += c.amount;
                if (c.type === 'use') useSum += c.amount;
            });
            document.getElementById('statCharge').textContent = formatNumber(chargeSum) + '원';
            document.getElementById('statBonus').textContent = formatNumber(bonusSum) + '원';
            document.getElementById('statUse').textContent = formatNumber(Math.abs(useSum)) + '원';
        }

        const tbody = document.getElementById('creditTable');
        tbody.innerHTML = credits.map(c => `
            <tr>
                <td class="text-muted">${c.id}</td>
                <td>${formatDate(c.created_at)}</td>
                <td>
                    <a href="/web/admin/users/${c.user_id}" class="text-decoration-none">
                        ${c.user_name} <small class="text-muted">(${c.username})</small>
                    </a>
                </td>
                <td>${TYPE_BADGE[c.type] || c.type}</td>
                <td class="fw-bold ${c.amount >= 0 ? 'text-success' : 'text-danger'}">
                    ${c.amount >= 0 ? '+' : ''}${formatNumber(c.amount)}원
                </td>
                <td class="small">${c.description || '-'}</td>
            </tr>
        `).join('') || '<tr><td colspan="6" class="text-center text-muted py-4">내역이 없습니다</td></tr>';

        // 페이지네이션
        const totalPages = Math.ceil(total / pageSize);
        const pag = document.getElementById('pagination');
        if (totalPages <= 1) { pag.innerHTML = ''; return; }
        let html = '';
        html += `<li class="page-item ${page<=1?'disabled':''}"><a class="page-link" href="#" onclick="loadCredits(${page-1});return false;">이전</a></li>`;
        for (let i = Math.max(1, page-2); i <= Math.min(totalPages, page+2); i++) {
            html += `<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="loadCredits(${i});return false;">${i}</a></li>`;
        }
        html += `<li class="page-item ${page>=totalPages?'disabled':''}"><a class="page-link" href="#" onclick="loadCredits(${page+1});return false;">다음</a></li>`;
        pag.innerHTML = html;
    }

    loadCredits();
</script>
{% endblock %}
