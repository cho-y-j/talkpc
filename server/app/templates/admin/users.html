{% extends "admin/base.html" %}
{% set active = "users" %}
{% block title %}회원관리 - TalkPC 관리자{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">회원관리</h4>
    <span class="badge bg-dark fs-6" id="userCount">0명</span>
</div>

<div class="card stat-card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th><th>아이디</th><th>이름</th><th>전화번호</th>
                        <th>역할</th><th>잔액</th><th>상태</th><th>가입일</th><th>관리</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 크레딧 부여 모달 -->
<div class="modal fade" id="creditModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">크레딧 부여</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p><strong id="creditUserName"></strong>에게 크레딧을 부여합니다.</p>
                <div class="mb-3">
                    <label class="form-label">금액 (원)</label>
                    <input type="number" class="form-control" id="creditAmount" value="10000">
                    <small class="text-muted">양수=충전, 음수=차감</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">설명</label>
                    <input type="text" class="form-control" id="creditDesc" value="관리자 충전">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button class="btn btn-primary" onclick="grantCredit()">부여</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let users = [];
    let creditUserId = null;

    async function loadUsers() {
        users = await api('/admin/users');
        if (!users) return;
        document.getElementById('userCount').textContent = users.length + '명';
        const tbody = document.getElementById('userTable');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td><code>${u.username}</code></td>
                <td>${u.name}</td>
                <td>${u.phone || '-'}</td>
                <td><span class="badge ${u.role==='admin'?'bg-danger':'bg-secondary'}">${u.role}</span></td>
                <td class="fw-bold">${formatNumber(u.balance)}원</td>
                <td>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" ${u.is_active?'checked':''} onchange="toggleActive(${u.id}, this.checked)">
                    </div>
                </td>
                <td>${formatDate(u.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="openCredit(${u.id},'${u.name}')">
                        <i class="bi bi-cash-coin"></i>
                    </button>
                    <a href="/web/admin/users/${u.id}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-eye"></i>
                    </a>
                </td>
            </tr>
        `).join('');
    }

    function openCredit(userId, name) {
        creditUserId = userId;
        document.getElementById('creditUserName').textContent = name;
        document.getElementById('creditAmount').value = 10000;
        document.getElementById('creditDesc').value = '관리자 충전';
        new bootstrap.Modal(document.getElementById('creditModal')).show();
    }

    async function grantCredit() {
        const amount = parseInt(document.getElementById('creditAmount').value);
        const desc = document.getElementById('creditDesc').value;
        const result = await api(`/admin/users/${creditUserId}/credit`, {
            method: 'POST', body: JSON.stringify({amount, description: desc})
        });
        if (result) {
            alert(result.message);
            bootstrap.Modal.getInstance(document.getElementById('creditModal')).hide();
            loadUsers();
        }
    }

    async function toggleActive(userId, active) {
        await api(`/admin/users/${userId}`, {
            method: 'PUT', body: JSON.stringify({is_active: active})
        });
        loadUsers();
    }

    loadUsers();
</script>
{% endblock %}
