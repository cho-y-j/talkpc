<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TalkPC 관리자{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 240px; }
        body { background: #f4f6f9; }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width); background: #212529;
            padding-top: 1rem; z-index: 100;
        }
        .sidebar .nav-link { color: #adb5bd; padding: .75rem 1.25rem; font-size: .9rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.08); }
        .sidebar .nav-link i { margin-right: .5rem; width: 20px; text-align: center; }
        .sidebar-brand { color: #fff; font-size: 1.2rem; font-weight: 700; padding: .5rem 1.25rem 1.5rem; }
        .main-content { margin-left: var(--sidebar-width); padding: 1.5rem; }
        .stat-card { border: none; border-radius: 12px; }
        .stat-card .card-body { padding: 1.25rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-label { font-size: .85rem; color: #6c757d; }
        .table th { font-weight: 600; font-size: .85rem; color: #6c757d; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="sidebar d-flex flex-column">
        <div class="sidebar-brand"><i class="bi bi-chat-dots-fill"></i> TalkPC</div>
        <ul class="nav flex-column flex-grow-1">
            <li class="nav-item">
                <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/web/admin/">
                    <i class="bi bi-speedometer2"></i> 대시보드
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'users' %}active{% endif %}" href="/web/admin/users">
                    <i class="bi bi-people"></i> 회원관리
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'logs' %}active{% endif %}" href="/web/admin/send-logs">
                    <i class="bi bi-send"></i> 발송로그
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'security' %}active{% endif %}" href="/web/admin/security-logs">
                    <i class="bi bi-shield-lock"></i> 보안로그
                </a>
            </li>
        </ul>
        <div class="p-3 border-top border-secondary">
            <small class="text-muted d-block" id="admin-name"></small>
            <a href="#" onclick="logout()" class="text-danger small"><i class="bi bi-box-arrow-left"></i> 로그아웃</a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TOKEN = localStorage.getItem('admin_token');
        const ADMIN_INFO = JSON.parse(localStorage.getItem('admin_info') || '{}');

        if (!TOKEN && !location.pathname.endsWith('/login')) {
            location.href = '/web/admin/login';
        }
        document.getElementById('admin-name') && (document.getElementById('admin-name').textContent = ADMIN_INFO.name || '관리자');

        const API_KEY = 'tpc-k8x2m9vQfR7wLpN3jY6sT0dA4hE1cU5b';

        async function api(path, opts = {}) {
            const res = await fetch('/api' + path, {
                ...opts,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, 'X-API-Key': API_KEY, ...(opts.headers || {}) }
            });
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_info');
            location.href = '/web/admin/login';
        }

        function formatNumber(n) { return (n || 0).toLocaleString(); }
        function formatDate(s) { if (!s) return '-'; const d = new Date(s); return d.toLocaleDateString('ko') + ' ' + d.toLocaleTimeString('ko', {hour:'2-digit',minute:'2-digit'}); }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
