{% extends "admin/base.html" %}
{% set active = "security" %}
{% block title %}보안로그 - TalkPC 관리자{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-shield-lock"></i> 보안 로그</h4>
    <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="filterType" style="width:150px" onchange="loadLogs()">
            <option value="">전체 이벤트</option>
            <option value="login">로그인</option>
            <option value="login_fail">로그인 실패</option>
            <option value="register">회원가입</option>
            <option value="device_new">새 기기</option>
            <option value="device_verify">기기 인증</option>
            <option value="auto_lock">자동 잠금</option>
            <option value="unlock">잠금 해제</option>
            <option value="password_change">비밀번호 변경</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadLogs()"><i class="bi bi-arrow-clockwise"></i> 새로고침</button>
    </div>
</div>

<!-- 요약 카드 -->
<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">오늘 총 이벤트</div>
                <div class="stat-value" id="statTotal">-</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">로그인 실패</div>
                <div class="stat-value text-danger" id="statFail">-</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">자동 잠금</div>
                <div class="stat-value text-warning" id="statLock">-</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card">
            <div class="card-body">
                <div class="stat-label">새 기기 등록</div>
                <div class="stat-value text-info" id="statDevice">-</div>
            </div>
        </div>
    </div>
</div>

<!-- 로그 테이블 -->
<div class="card stat-card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th><th>일시</th><th>사용자</th><th>이벤트</th><th>상세</th><th>IP</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 페이지네이션 -->
<nav class="mt-3 d-flex justify-content-center">
    <ul class="pagination pagination-sm" id="pagination"></ul>
</nav>
{% endblock %}

{% block scripts %}
<script>
    const EVENT_LABEL = {
        'login': '로그인', 'login_fail': '로그인 실패', 'register': '회원가입',
        'device_new': '새 기기', 'device_verify': '기기 인증', 'auto_lock': '자동 잠금',
        'unlock': '잠금 해제', 'password_change': '비밀번호 변경'
    };

    const EVENT_BADGE = {
        'login': 'bg-success', 'login_fail': 'bg-danger', 'register': 'bg-primary',
        'device_new': 'bg-info', 'device_verify': 'bg-info', 'auto_lock': 'bg-warning text-dark',
        'unlock': 'bg-secondary', 'password_change': 'bg-dark'
    };

    let currentPage = 1;
    const pageSize = 50;

    async function loadLogs(page = 1) {
        currentPage = page;
        const eventType = document.getElementById('filterType').value;
        let url = `/admin/security-logs?page=${page}&size=${pageSize}`;
        if (eventType) url += `&event_type=${eventType}`;

        const data = await api(url);
        if (!data) return;

        const logs = data.logs || data;
        const total = data.total || logs.length;

        // 요약 통계
        if (page === 1 && !eventType) {
            let failCount = 0, lockCount = 0, deviceCount = 0;
            logs.forEach(l => {
                if (l.event_type === 'login_fail') failCount++;
                if (l.event_type === 'auto_lock') lockCount++;
                if (l.event_type === 'device_new') deviceCount++;
            });
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statFail').textContent = failCount;
            document.getElementById('statLock').textContent = lockCount;
            document.getElementById('statDevice').textContent = deviceCount;
        }

        const tbody = document.getElementById('logTable');
        tbody.innerHTML = logs.map(l => `
            <tr>
                <td class="text-muted">${l.id}</td>
                <td>${formatDate(l.created_at)}</td>
                <td>
                    ${l.user_id ? `<a href="/web/admin/users/${l.user_id}" class="text-decoration-none">${l.username || 'ID:' + l.user_id}</a>` : '-'}
                </td>
                <td><span class="badge ${EVENT_BADGE[l.event_type] || 'bg-dark'}">${EVENT_LABEL[l.event_type] || l.event_type}</span></td>
                <td class="small">${l.detail || '-'}</td>
                <td><code class="small">${l.ip_address || '-'}</code></td>
            </tr>
        `).join('') || '<tr><td colspan="6" class="text-center text-muted py-4">보안 로그가 없습니다</td></tr>';

        // 페이지네이션
        const totalPages = Math.ceil(total / pageSize);
        const pag = document.getElementById('pagination');
        if (totalPages <= 1) { pag.innerHTML = ''; return; }
        let html = '';
        html += `<li class="page-item ${page<=1?'disabled':''}"><a class="page-link" href="#" onclick="loadLogs(${page-1});return false;">이전</a></li>`;
        for (let i = Math.max(1, page-2); i <= Math.min(totalPages, page+2); i++) {
            html += `<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="loadLogs(${i});return false;">${i}</a></li>`;
        }
        html += `<li class="page-item ${page>=totalPages?'disabled':''}"><a class="page-link" href="#" onclick="loadLogs(${page+1});return false;">다음</a></li>`;
        pag.innerHTML = html;
    }

    loadLogs();
</script>
{% endblock %}
