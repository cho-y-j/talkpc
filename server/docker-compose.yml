services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: talkpc
      POSTGRES_USER: talkpc
      POSTGRES_PASSWORD: talkpc1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talkpc"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://talkpc:talkpc1234@postgres:5432/talkpc
      JWT_SECRET: change-this-secret-in-production
      API_SECRET_KEY: tpc-k8x2m9vQfR7wLpN3jY6sT0dA4hE1cU5b
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  messaging-agent:
    image: openjdk:17-slim
    working_dir: /agent
    volumes:
      - ../MessagingAgent_v1.7.1.4:/agent
    command: ["java", "-jar", "MessagingAgent.jar", "/agent"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - with-agent

volumes:
  postgres_data:
